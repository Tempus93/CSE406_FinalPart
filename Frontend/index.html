        let signer;


          async function loadAddresses() {
              try {
                  const response = await fetch('addresses.json');
                  const data = await response.json();
                  
                  coinAddr = data.coin;
                  nftAddr = data.nft;
                  vaultAddr = data.vault;
                  
                  console.log("Addresses loaded automatically:", data);
                  
                  // Now you can initialize your contracts here
                  initContracts(); 
              } catch (error) {
                  console.error("Could not load addresses. Make sure you ran the deploy script!", error);
              }
          }

// Call this as soon as the window loads
          window.onload = loadAddresses;

          async function connectWallet() {
          
            if (window.ethereum) {
                const provider = new ethers.BrowserProvider(window.ethereum);
                signer = await provider.getSigner();
                document.getElementById('status').innerText = "Connected: " + await signer.getAddress();
            } else {
                alert("Please install MetaMask!");
            }
        }

        async function approveVault() {
            const amount = document.getElementById('amount').value;
            const coinContract = new ethers.Contract(coinAddr, coinABI, signer);
            const tx = await coinContract.approve(vaultAddr, ethers.parseUnits(amount, 18));
            await tx.wait();
            alert("Step 1 Complete: Vault Approved!");
        }

        async function depositCoins() {
            const amount = document.getElementById('amount').value;
            const vaultContract = new ethers.Contract(vaultAddr, vaultABI, signer);
            // This triggers Task 3 logic: Minting the NFT
            const tx = await vaultContract.deposit(ethers.parseUnits(amount, 18));
            await tx.wait();
            alert("Step 2 Complete: Deposited! Check your wallet for the Membership NFT.");
        }

        async function withdrawCoins() {
            const amount = document.getElementById('amount').value;
            const vaultContract = new ethers.Contract(vaultAddr, vaultABI, signer);
            // This triggers Task 2 (Fee) and Task 4 (Revocation)
            const tx = await vaultContract.withdraw(ethers.parseUnits(amount, 18));
            await tx.wait();
            alert("Withdrawn! Fee sent to admin and NFT revoked.");
        }
